<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#100b18">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Guardians">
<title>Guardians of the Hearth</title>
<style>
:root{
  color-scheme:dark;
  --bg:#0a0710;
  --bg2:#130c1d;
  --panel:rgba(28,20,38,.72);
  --panel-solid:#1c1426;
  --panel-2:rgba(39,27,51,.78);
  --stroke:rgba(255,255,255,.10);
  --stroke-strong:rgba(255,255,255,.18);
  --ink:#fff8ed;
  --muted:#afa4b8;
  --muted2:#7f7589;
  --ember:#ff9a4b;
  --ember2:#ffca69;
  --rose:#ff729f;
  --violet:#9b7cff;
  --aqua:#61d8db;
  --moss:#78d29a;
  --danger:#ff657d;
  --gold:#ffd06f;
  --shadow:0 20px 70px rgba(0,0,0,.44);
  --radius-xl:30px;
  --radius-lg:24px;
  --radius-md:18px;
  --nav-h:82px;
  --serif:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;
  --sans:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;min-height:100%;background:var(--bg);color:var(--ink);font-family:var(--sans);overscroll-behavior:none}
body{min-height:100dvh;overflow-x:hidden}
button,input{font:inherit}
button{color:inherit}
button:focus-visible,[tabindex]:focus-visible{outline:3px solid rgba(255,202,105,.8);outline-offset:3px}
img,svg{display:block}
.hidden{display:none!important}
.app{min-height:100dvh;position:relative;overflow:hidden;background:
  radial-gradient(900px 540px at 50% -10%,rgba(126,83,197,.19),transparent 68%),
  radial-gradient(620px 440px at -10% 72%,rgba(255,113,80,.10),transparent 70%),
  linear-gradient(180deg,#100a18 0%,#09070e 100%)}
.ambient{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:0}
.ambient:before,.ambient:after{content:"";position:absolute;border-radius:50%;filter:blur(55px);opacity:.26;animation:drift 14s ease-in-out infinite alternate}
.ambient:before{width:280px;height:280px;background:#744ed1;top:12%;left:-140px}
.ambient:after{width:360px;height:360px;background:#d45b48;right:-210px;bottom:0;animation-delay:-6s}
@keyframes drift{to{transform:translate3d(30px,-40px,0) scale(1.12)}}
.noise{position:fixed;inset:0;pointer-events:none;z-index:1;opacity:.035;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 160 160' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.8'/%3E%3C/svg%3E")}
.shell{position:relative;z-index:2;width:min(100%,560px);min-height:100dvh;margin:0 auto;padding:calc(env(safe-area-inset-top) + 8px) 16px calc(var(--nav-h) + env(safe-area-inset-bottom) + 24px)}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:6px 2px 14px}
.brand{display:flex;align-items:center;gap:10px;min-width:0}
.brand-mark{width:38px;height:38px;border-radius:14px;display:grid;place-items:center;background:linear-gradient(145deg,#ffcf72,#ff7e45);box-shadow:0 8px 26px rgba(255,133,65,.34);color:#28120b}
.brand-copy{min-width:0}
.brand-title{font:700 18px/1.1 var(--serif);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.brand-kicker{font-size:10px;color:var(--muted);letter-spacing:.18em;text-transform:uppercase;margin-top:3px}
.avatar-btn{width:42px;height:42px;border:1px solid var(--stroke);border-radius:50%;padding:2px;background:rgba(255,255,255,.06);box-shadow:0 9px 24px rgba(0,0,0,.25);cursor:pointer}
.avatar-btn span{width:100%;height:100%;display:grid;place-items:center;border-radius:50%;background:linear-gradient(145deg,#7160a7,#332447);font-weight:800;font-size:13px}
.page{animation:pageIn .38s cubic-bezier(.2,.8,.2,1) both}
@keyframes pageIn{from{opacity:0;transform:translateY(12px) scale(.99)}to{opacity:1;transform:none}}
.section-head{display:flex;align-items:flex-end;justify-content:space-between;gap:14px;margin:4px 2px 14px}
.section-head h1,.section-head h2{margin:0;font-family:var(--serif);font-weight:700;letter-spacing:-.02em}
.section-head h1{font-size:31px;line-height:1.02}.section-head h2{font-size:23px}
.section-head p{margin:5px 0 0;color:var(--muted);font-size:13px}
.text-btn{border:0;background:none;color:var(--ember2);font-weight:750;padding:8px 0;cursor:pointer}
.glass{background:linear-gradient(155deg,rgba(255,255,255,.095),rgba(255,255,255,.035));border:1px solid var(--stroke);box-shadow:var(--shadow);backdrop-filter:blur(22px) saturate(1.2);-webkit-backdrop-filter:blur(22px) saturate(1.2)}
.card{border-radius:var(--radius-lg);padding:16px;margin-bottom:14px;position:relative;overflow:hidden}
.hero{min-height:530px;border-radius:32px;padding:0;overflow:hidden;background:#191022;border:1px solid rgba(255,255,255,.13);box-shadow:0 30px 90px rgba(0,0,0,.48)}
.hero-scene{height:355px;position:relative;overflow:hidden;background:
  radial-gradient(circle at 50% 55%,rgba(255,176,86,.24),transparent 33%),
  linear-gradient(180deg,#312545 0%,#1b1427 55%,#100c16 100%)}

.hero-orb{position:absolute;width:250px;height:250px;border-radius:50%;left:50%;top:43%;transform:translate(-50%,-50%);background:radial-gradient(circle,rgba(255,214,136,.22),rgba(255,138,73,.08) 54%,transparent 72%);filter:blur(1px);animation:breathe 3.5s ease-in-out infinite}
@keyframes breathe{50%{transform:translate(-50%,-50%) scale(1.12);opacity:.72}}
.guardian-svg{position:absolute;z-index:3;width:292px;height:292px;left:50%;bottom:10px;transform:translateX(-50%);filter:drop-shadow(0 24px 24px rgba(0,0,0,.46));animation:guardianFloat 4s ease-in-out infinite}
@keyframes guardianFloat{50%{transform:translateX(-50%) translateY(-8px) rotate(.6deg)}}
.spark{position:absolute;z-index:2;border-radius:50%;background:#ffd98b;box-shadow:0 0 9px #ff9b50;animation:spark 4s linear infinite}
@keyframes spark{0%{transform:translateY(18px) scale(.5);opacity:0}20%{opacity:.8}100%{transform:translateY(-140px) translateX(18px) scale(1.2);opacity:0}}
.hero-top{position:absolute;z-index:5;top:14px;left:14px;right:14px;display:flex;justify-content:space-between;align-items:center}
.level-chip,.live-chip{display:inline-flex;align-items:center;gap:7px;border-radius:999px;padding:8px 11px;background:rgba(15,10,20,.55);border:1px solid rgba(255,255,255,.13);backdrop-filter:blur(12px);font-size:12px;font-weight:750}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--moss);box-shadow:0 0 10px var(--moss);animation:blink 2s ease-in-out infinite}
@keyframes blink{50%{opacity:.42}}
.hero-copy{padding:0 18px 18px;position:relative;margin-top:-14px;z-index:6}
.hero-name-row{display:flex;align-items:end;justify-content:space-between;gap:10px}
.hero-name{margin:0;font:700 30px/1 var(--serif);letter-spacing:-.025em;text-shadow:0 2px 12px #000}
.hero-role{color:var(--ember2);font-size:12px;font-weight:750;margin-top:5px}
.mood{font-size:12px;color:var(--muted);text-align:right}.mood strong{display:block;color:var(--ink);font-size:14px}
.xp{margin-top:15px}.xp-meta{display:flex;justify-content:space-between;color:var(--muted);font-size:11px;margin-bottom:7px}.xp-track{height:9px;border-radius:999px;background:rgba(255,255,255,.07);overflow:hidden;border:1px solid rgba(255,255,255,.06)}
.xp-fill{height:100%;border-radius:inherit;background:linear-gradient(90deg,#ff7b48,#ffd16e);box-shadow:0 0 16px rgba(255,154,75,.5);transition:width .8s cubic-bezier(.2,.8,.2,1)}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-top:13px}.stat{background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.075);border-radius:16px;padding:10px;text-align:center}.stat b{display:block;font-size:16px}.stat span{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
.primary{width:100%;min-height:56px;border:0;border-radius:18px;background:linear-gradient(135deg,#ffd06f 0%,#ff9a4b 48%,#ff6c6c 100%);color:#2a130c;font-weight:850;letter-spacing:-.01em;box-shadow:0 12px 32px rgba(255,126,75,.28),inset 0 1px 0 rgba(255,255,255,.55);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px;transition:transform .16s ease,filter .16s ease}.primary:active{transform:scale(.975);filter:saturate(1.12)}
.secondary{min-height:48px;border-radius:16px;border:1px solid var(--stroke);background:rgba(255,255,255,.055);font-weight:720;cursor:pointer;padding:0 16px;display:inline-flex;align-items:center;justify-content:center;gap:8px}.secondary:active{transform:scale(.97)}
.quick-grid{display:grid;grid-template-columns:1.15fr .85fr;gap:12px;margin-top:14px}.mini-card{min-height:142px;border-radius:22px;padding:15px;position:relative;overflow:hidden;cursor:pointer}.mini-card h3{font:700 20px/1.1 var(--serif);margin:0}.mini-card p{font-size:12px;color:var(--muted);margin:5px 0 0;max-width:75%}.mini-card .big-icon{position:absolute;right:7px;bottom:5px;width:84px;height:84px;opacity:.88;filter:drop-shadow(0 10px 20px rgba(0,0,0,.3))}.mini-card .big-icon svg{width:100%;height:100%}.quest-mini{background:linear-gradient(145deg,rgba(99,74,155,.52),rgba(36,25,50,.82))}.chest-mini{background:linear-gradient(145deg,rgba(154,91,50,.58),rgba(40,26,32,.84))}.progress-ring{position:absolute;right:14px;top:13px;width:42px;height:42px}.progress-ring circle{fill:none;stroke-width:4}.progress-ring .track{stroke:rgba(255,255,255,.12)}.progress-ring .fill{stroke:var(--ember2);stroke-linecap:round;transform:rotate(-90deg);transform-origin:center;transition:stroke-dashoffset .6s ease}
.daily-row{display:flex;gap:9px;overflow-x:auto;padding:2px 1px 6px;scrollbar-width:none}.daily-row::-webkit-scrollbar{display:none}.day-pill{flex:0 0 56px;border-radius:18px;padding:10px 5px;background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.06);text-align:center}.day-pill span{display:block;font-size:10px;color:var(--muted);text-transform:uppercase}.day-pill b{font-size:13px;margin-top:4px;display:block}.day-pill.done{background:rgba(120,210,154,.12);border-color:rgba(120,210,154,.3)}.day-pill.today{background:linear-gradient(145deg,rgba(255,154,75,.25),rgba(255,114,159,.10));border-color:rgba(255,202,105,.45);box-shadow:0 8px 26px rgba(255,136,77,.12)}
.quest-card{display:flex;align-items:center;gap:12px;padding:14px;border-radius:20px;margin-bottom:10px;background:linear-gradient(145deg,rgba(255,255,255,.07),rgba(255,255,255,.03));border:1px solid var(--stroke);position:relative;overflow:hidden}.quest-card.done{opacity:.68}.quest-card.done:after{content:"COMPLETE";position:absolute;right:-24px;top:15px;transform:rotate(35deg);font-size:9px;letter-spacing:.12em;font-weight:900;color:#193422;background:var(--moss);padding:5px 26px}.quest-icon{width:50px;height:50px;flex:0 0 auto;border-radius:17px;display:grid;place-items:center;background:linear-gradient(145deg,rgba(255,202,105,.20),rgba(155,124,255,.13));border:1px solid rgba(255,255,255,.09)}.quest-icon svg{width:27px;height:27px}.quest-body{min-width:0;flex:1}.quest-title{font-weight:760;font-size:14px}.quest-sub{font-size:11px;color:var(--muted);margin-top:3px}.reward{font-size:11px;color:var(--ember2);font-weight:750;margin-top:5px}.quest-btn{width:42px;height:42px;flex:0 0 auto;border-radius:50%;border:1px solid var(--stroke);background:rgba(255,255,255,.06);display:grid;place-items:center;cursor:pointer}.quest-btn.done{background:rgba(120,210,154,.16);color:var(--moss)}
.map{height:430px;border-radius:30px;position:relative;overflow:hidden;background:
  radial-gradient(circle at 72% 25%,rgba(114,216,219,.26),transparent 22%),
  radial-gradient(circle at 30% 70%,rgba(255,119,102,.22),transparent 28%),
  linear-gradient(160deg,#2a2342,#181323 58%,#100d18);border:1px solid rgba(255,255,255,.12);box-shadow:var(--shadow)}
.map svg.map-art{position:absolute;inset:0;width:100%;height:100%}.map-fog{position:absolute;inset:0;background:linear-gradient(180deg,transparent 50%,rgba(9,7,14,.78) 100%);pointer-events:none}.map-node{position:absolute;width:62px;height:62px;border-radius:22px;border:1px solid rgba(255,255,255,.18);background:rgba(22,15,31,.72);backdrop-filter:blur(12px);display:grid;place-items:center;box-shadow:0 10px 28px rgba(0,0,0,.35);cursor:pointer;animation:nodeFloat 3.2s ease-in-out infinite}.map-node svg{width:30px;height:30px}.map-node.locked{filter:grayscale(.8);opacity:.48}.map-node.active{background:linear-gradient(145deg,rgba(255,202,105,.38),rgba(255,113,80,.24));border-color:rgba(255,213,135,.7);box-shadow:0 0 0 7px rgba(255,154,75,.08),0 12px 30px rgba(0,0,0,.4)}.map-node:nth-of-type(2){animation-delay:-1s}.map-node:nth-of-type(3){animation-delay:-2s}@keyframes nodeFloat{50%{transform:translateY(-6px)}}
.map-label{position:absolute;transform:translateX(-50%);font-size:10px;font-weight:800;letter-spacing:.07em;text-transform:uppercase;color:#fff;text-shadow:0 2px 7px #000;white-space:nowrap}
.adventure-list{margin-top:14px}.adventure-card{display:flex;gap:12px;align-items:center;padding:13px;border-radius:20px;margin-bottom:10px}.scene-thumb{width:76px;height:70px;border-radius:16px;overflow:hidden;flex:0 0 auto;background:#2a1e35;position:relative}.scene-thumb svg{width:100%;height:100%}.adv-copy{min-width:0;flex:1}.adv-copy b{font-family:var(--serif);font-size:17px}.adv-copy p{margin:4px 0 0;color:var(--muted);font-size:11px}.difficulty{margin-top:6px;color:var(--gold);font-size:10px;letter-spacing:2px}.go-btn{width:42px;height:42px;border:1px solid var(--stroke);border-radius:15px;background:rgba(255,255,255,.06);cursor:pointer;display:grid;place-items:center}
.hearth-scene{height:230px;border-radius:28px;overflow:hidden;position:relative;background:linear-gradient(180deg,#261d38,#14101d);border:1px solid var(--stroke);box-shadow:var(--shadow)}.hearth-scene svg{width:100%;height:100%}.hearth-glow{position:absolute;width:160px;height:90px;left:50%;bottom:0;transform:translateX(-50%);background:radial-gradient(ellipse,rgba(255,147,66,.45),transparent 68%);filter:blur(9px);animation:breathe 3s ease-in-out infinite}
.resource-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:12px 0}.resource{padding:10px;border-radius:16px;text-align:center;background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.07)}.resource b{display:block;font-size:15px}.resource span{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em}
.building{padding:14px;border-radius:20px;margin-bottom:10px;display:flex;align-items:center;gap:12px}.building-icon{width:52px;height:52px;border-radius:17px;display:grid;place-items:center;background:rgba(255,154,75,.12);border:1px solid rgba(255,202,105,.20)}.building-icon svg{width:29px}.building-copy{flex:1}.building-copy b{font-size:14px}.building-copy p{font-size:11px;color:var(--muted);margin:3px 0}.level-dots{display:flex;gap:4px}.level-dots i{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.1)}.level-dots i.on{background:var(--ember2);box-shadow:0 0 7px var(--ember)}.upgrade{border:1px solid rgba(255,202,105,.25);background:rgba(255,154,75,.10);border-radius:13px;padding:9px 11px;font-size:11px;font-weight:780;cursor:pointer}.upgrade:disabled{opacity:.4;cursor:not-allowed}
.collection-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:11px}.collectible{aspect-ratio:.84;border-radius:24px;position:relative;overflow:hidden;border:1px solid var(--stroke);background:linear-gradient(155deg,rgba(255,255,255,.08),rgba(255,255,255,.025));padding:12px;cursor:pointer}.collectible.equipped{border-color:rgba(255,208,111,.68);box-shadow:inset 0 0 0 1px rgba(255,208,111,.25),0 12px 32px rgba(255,144,73,.13)}.collectible.locked{filter:grayscale(.85);opacity:.47}.rarity{font-size:9px;font-weight:900;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}.collect-art{height:116px;display:grid;place-items:center}.collect-art svg{width:100px;height:100px;filter:drop-shadow(0 14px 20px rgba(0,0,0,.36))}.collectible b{font:700 16px/1.1 var(--serif);display:block}.collectible p{font-size:10px;color:var(--muted);margin:5px 0}.equipped-tag{position:absolute;right:9px;top:9px;border-radius:999px;padding:5px 8px;background:rgba(255,208,111,.16);color:var(--gold);font-size:8px;font-weight:900;letter-spacing:.08em}
.nav{position:fixed;z-index:50;left:50%;bottom:max(10px,env(safe-area-inset-bottom));transform:translateX(-50%);width:min(calc(100% - 24px),536px);height:var(--nav-h);display:grid;grid-template-columns:repeat(5,1fr);padding:7px;border-radius:27px;background:rgba(19,13,26,.78);border:1px solid rgba(255,255,255,.12);box-shadow:0 20px 60px rgba(0,0,0,.5);backdrop-filter:blur(25px) saturate(1.35);-webkit-backdrop-filter:blur(25px) saturate(1.35)}
.nav button{border:0;background:transparent;border-radius:20px;color:var(--muted2);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-size:9px;font-weight:720;cursor:pointer;position:relative}.nav button svg{width:23px;height:23px}.nav button.active{color:var(--ink);background:linear-gradient(145deg,rgba(255,255,255,.10),rgba(255,255,255,.045))}.nav button.active:before{content:"";position:absolute;top:5px;width:18px;height:3px;border-radius:999px;background:linear-gradient(90deg,var(--ember),var(--gold));box-shadow:0 0 10px var(--ember)}
.modal{position:fixed;z-index:100;inset:0;background:rgba(5,3,8,.68);backdrop-filter:blur(14px);display:flex;align-items:flex-end;justify-content:center;padding:16px 16px calc(env(safe-area-inset-bottom) + 12px);animation:fade .25s ease both}.sheet{width:min(100%,520px);max-height:88dvh;overflow:auto;border-radius:30px;padding:18px;background:linear-gradient(165deg,rgba(42,30,54,.98),rgba(21,15,29,.98));border:1px solid rgba(255,255,255,.14);box-shadow:0 40px 100px rgba(0,0,0,.65);animation:sheetUp .35s cubic-bezier(.2,.85,.2,1) both}.sheet-handle{width:42px;height:5px;border-radius:999px;background:rgba(255,255,255,.18);margin:0 auto 16px}.sheet h2{font:700 27px/1 var(--serif);margin:0}.sheet .subtitle{color:var(--muted);font-size:12px;margin:7px 0 16px}.sheet-row{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:14px 0;border-bottom:1px solid rgba(255,255,255,.07)}.sheet-row:last-child{border-bottom:0}.toggle{width:51px;height:31px;border:0;border-radius:999px;background:rgba(255,255,255,.12);padding:3px;cursor:pointer}.toggle i{display:block;width:25px;height:25px;border-radius:50%;background:white;transition:transform .25s ease}.toggle.on{background:var(--moss)}.toggle.on i{transform:translateX(20px)}

function header(){return `<header class="topbar"><div class="brand"><div class="brand-mark">${icon('flame',22)}</div><div class="brand-copy"><div class="brand-title">Guardians of the Hearth</div><div class="brand-kicker">${esc(state.name)}’s sanctuary</div></div></div><button class="avatar-btn" data-action="profile" aria-label="Open profile"><span>${esc(state.name.slice(0,2).toUpperCase())}</span></button></header>`}
function nav(){const tabs=[['home','home','Hearth'],['quests','quests','Quests'],['map','map','Explore'],['hearth','hearth','Build'],['vault','bag','Vault']];return `<nav class="nav" aria-label="Main navigation">${tabs.map(([id,ic,label])=>`<button data-tab="${id}" class="${state.tab===id?'active':''}" aria-current="${state.tab===id?'page':'false'}">${icon(ic,23)}<span>${label}</span></button>`).join('')}</nav>`}
function sparkles(){return Array.from({length:11},(_,i)=>`<i class="spark" style="left:${10+(i*31)%82}%;top:${52+(i*17)%35}%;width:${2+(i%3)}px;height:${2+(i%3)}px;animation-delay:-${i*.38}s;animation-duration:${3.2+(i%4)*.55}s"></i>`).join('')}
function homePage(){
 const done=state.quests.filter(q=>q.done).length;
 const variant=state.equipped==='moss-cloak'?'moss':state.equipped==='star-charm'?'star':'default';
 const mainPct=Math.min(100,Math.round(state.xp/state.xpMax*100));
 const dailyPct=Math.round(done/state.quests.length*100);
 return `<main class="page"><section class="home-stage"><div class="home-canvas"><div class="home-scene"><div class="scene-backdrop">${villageHomeArt()}</div><div class="home-overhead"><div class="player-pill"><div class="player-portrait">${guardianArt(variant)}</div><div class="player-copy"><strong>${esc(state.guardian)}</strong><span>${esc(state.name)}’s Hearthkeeper</span><div class="profile-level">${icon('crown',12)} Level ${state.level}</div><div class="mini-xp"><i style="width:${mainPct}%"></i></div></div></div><div class="currency-stack"><div class="currency-pill"><span class="orb">✦</span><b>${state.gold.toLocaleString()}</b><span class="plus">+</span></div><div class="currency-pill"><span class="orb">◈</span><b>${state.resources.crystal}</b><span class="plus">+</span></div><div class="currency-pill"><span class="orb">🔥</span><b>${state.resources.ember}</b><span class="plus">+</span></div></div></div><div class="home-title-wrap"><div class="home-logo">Guardians<small>of the</small>Hearth</div><div class="home-logo-flourish">A Cozy Fantasy Adventure</div></div><div class="side-buttons"><button class="side-btn" data-action="dailyChest"><div class="sb-ico">🎁</div><span>Rewards</span></button><button class="side-btn" data-tab="quests"><div class="sb-ico">🔥</div><span>Events</span></button></div><div class="home-pedestal"></div><div class="home-guardian-wrap">${guardianArt(variant)}</div><div class="quest-deck"><article class="quest-feature quest-main" data-tab="quests"><div class="quest-kicker">${icon('quests',14)} Main Quest</div><h3>Keep the Hearth Burning</h3><p>Gather Emberstone and complete brave acts to strengthen the eternal flame.</p><div class="art-badge">💎</div><div class="quest-progress"><div class="label"><span>${Math.min(state.level*3+state.victories,25)} / 25</span><span>${mainPct}%</span></div><div class="track"><i style="width:${Math.min(100,((state.level*3+state.victories)/25)*100)}%"></i></div></div></article><article class="quest-feature quest-daily" data-tab="quests"><div class="quest-kicker">${icon('leaf',14)} Daily Quest</div><h3>Share the Warmth</h3><p>${done===3?'All daily acts are complete.':'Complete your daily courage quests and spread light through the village.'}</p><div class="quest-reward"><div class="token">♥</div><span>x75</span></div><div class="quest-progress"><div class="label"><span>${done} / ${state.quests.length}</span><span>${dailyPct}%</span></div><div class="track"><i style="width:${dailyPct}%"></i></div></div></article></div><div class="hearth-call-wrap"><button class="hearth-call" data-action="talk"><span><i class="flame-mark">🔥</i>Hearth Call</span></button></div></div></div><div class="home-meta-strip"><div class="home-meta-card"><b>${state.streak}</b><span>Flame Streak</span></div><div class="home-meta-card"><b>${state.energy}/10</b><span>Guardian Energy</span></div><div class="home-meta-card"><b>${state.hearts}</b><span>Warm Hearts</span></div></div><div class="cta-row"><button class="gold-btn" data-tab="map">${icon('map',20)} Explore Realms</button><button class="secondary" data-tab="vault">${icon('bag',18)} Open Vault</button></div><section class="feature-panel"><h2>Designed like a real mobile game</h2><p>Your app now has a richer cinematic home screen, stronger visual hierarchy, bigger tap targets, and a premium fantasy presentation inspired by App Store-quality casual games.</p></section></section></main>`
}
function questsPage(){const done=state.quests.filter(q=>q.done).length;return `<main class="page"><div class="section-head"><div><h1>Daily Quests</h1><p>Real-world courage becomes magic here.</p></div><span class="level-chip">${done}/3 complete</span></div><section class="card glass"><div style="display:flex;align-items:center;gap:13px"><div class="quest-icon" style="width:62px;height:62px">${icon('flame',34)}</div><div><div style="font:700 20px var(--serif)">Today’s flame</div><div style="color:var(--muted);font-size:12px;margin-top:3px">Complete all three to earn a rare chest.</div></div></div><div class="xp-track" style="margin-top:14px;height:11px"><div class="xp-fill" style="width:${done/3*100}%"></div></div></section>${state.quests.map(q=>`<article class="quest-card ${q.done?'done':''}"><div class="quest-icon">${icon(q.icon,27)}</div><div class="quest-body"><div class="quest-title">${esc(q.title)}</div><div class="quest-sub">${esc(q.sub)}</div><div class="reward">+${q.reward} bond XP · +${Math.round(q.reward*.7)} starlight</div></div><button class="quest-btn ${q.done?'done':''}" data-quest="${q.id}" aria-label="${q.done?'Quest completed':'Complete '+esc(q.title)}">${icon(q.done?'check':'chevron',21)}</button></article>`).join('')}<section class="card glass" style="margin-top:14px"><div class="section-head" style="margin:0"><div><h2>Family promise</h2><p>No shame, no pressure—just encouragement.</p></div>${icon('heart',27)}</div></section></main>`}
function mapPage(){return `<main class="page"><div class="section-head"><div><h1>Wild Realms</h1><p>Send your guardian beyond the warm light.</p></div><span class="level-chip">${state.energy} ⚡</span></div><section class="map">${mapArt()}<div class="map-fog"></div><button class="map-node active" style="left:8%;top:68%" data-battle="woods">${icon('leaf',31)}</button><span class="map-label" style="left:16%;top:84%">Whispering Wood</span><button class="map-node" style="left:45%;top:39%" data-battle="caves">${icon('sparkle',31)}</button><span class="map-label" style="left:53%;top:55%">Crystal Hollow</span><button class="map-node ${state.level<10?'locked':''}" style="right:7%;top:12%" data-battle="citadel">${icon(state.level<10?'lock':'crown',29)}</button><span class="map-label" style="left:84%;top:29%">Ashen Citadel</span></section><div class="adventure-list">${[['woods','Whispering Wood','A gentle forest patrol.','★☆☆'],['caves','Crystal Hollow','Shadows guard the moon crystals.','★★☆'],['citadel','Ashen Citadel','Unlocks at guardian level 10.','★★★']].map(([id,n,d,dif],i)=>`<article class="adventure-card glass"><div class="scene-thumb">${sceneArt(id)}</div><div class="adv-copy"><b>${n}</b><p>${d}</p><div class="difficulty">${dif}</div></div><button class="go-btn" data-battle="${id}" ${id==='citadel'&&state.level<10?'disabled':''}>${icon(id==='citadel'&&state.level<10?'lock':'chevron',21)}</button></article>`).join('')}</div></main>`}
function dots(n){return `<span class="level-dots">${[1,2,3,4,5].map(i=>`<i class="${i<=n?'on':''}"></i>`).join('')}</span>`}
function hearthPage(){const buildings=[['hearth','flame','Grand Hearth','Raises guardian energy','ember',4],['workshop','wand','Moon Workshop','Improves quest rewards','wood',16],['garden','leaf','Glow Garden','Grows healing herbs','crystal',8]];return `<main class="page"><div class="section-head"><div><h1>Your Hearth</h1><p>Build a sanctuary worth returning to.</p></div></div><section class="hearth-scene">${hearthArt()}<div class="hearth-glow"></div></section><div class="resource-strip"><div class="resource"><b>🪵 ${state.resources.wood}</b><span>Moonwood</span></div><div class="resource"><b>◈ ${state.resources.crystal}</b><span>Crystal</span></div><div class="resource"><b>🔥 ${state.resources.ember}</b><span>Ember</span></div></div>${buildings.map(([id,ic,name,desc,res,cost])=>{const lv=state.buildings[id];return `<article class="building glass"><div class="building-icon">${icon(ic,29)}</div><div class="building-copy"><b>${name}</b><p>${desc}</p>${dots(lv)}</div><button class="upgrade" data-upgrade="${id}" data-res="${res}" data-cost="${cost}" ${lv>=5||state.resources[res]<cost?'disabled':''}>${lv>=5?'Max':`${cost} ${res==='wood'?'🪵':res==='crystal'?'◈':'🔥'}`}</button></article>`}).join('')}<section class="card glass" style="margin-top:14px"><div class="section-head" style="margin:0"><div><h2>Hearth blessing</h2><p>Upgrades are permanent and saved on this device.</p></div>${icon('sun',27)}</div></section></main>`}
function vaultPage(){const items=[['ember-crown','Legendary','Ember Crown','A crown forged from the first spark.'],['moss-cloak','Rare','Mossweave Cloak','Soft as leaves after summer rain.'],['star-charm','Epic','Starfall Charm','Carries a tiny piece of midnight.'],['moon-drop','Mythic','Moon Drop','Defeat the Ashen Warden to discover it.']];return `<main class="page"><div class="section-head"><div><h1>Guardian Vault</h1><p>Every treasure changes how Emberlyn appears.</p></div><span class="level-chip">${state.owned.length}/${items.length}</span></div><div class="collection-grid">${items.map(([id,rar,name,desc])=>{const owned=state.owned.includes(id),eq=state.equipped===id;return `<article class="collectible ${owned?'':'locked'} ${eq?'equipped':''}" data-equip="${id}">${eq?'<span class="equipped-tag">EQUIPPED</span>':''}<div class="rarity" style="color:${rar==='Legendary'?'var(--gold)':rar==='Epic'?'#b7a3ff':rar==='Rare'?'var(--aqua)':'var(--rose)'}">${rar}</div><div class="collect-art">${collectibleArt(id)}</div><b>${name}</b><p>${desc}</p></article>`}).join('')}</div></main>`}
function profileSheet(){return `<div class="modal" data-close="modal"><section class="sheet" role="dialog" aria-modal="true" aria-label="Profile and settings"><div class="sheet-handle"></div><div style="display:flex;justify-content:space-between;gap:12px"><div><h2>${esc(state.name)} & ${esc(state.guardian)}</h2><p class="subtitle">A private, device-only family adventure.</p></div><button class="avatar-btn" data-close="modal">${icon('close',20)}</button></div><div class="sheet-row"><div><b>Sound effects</b><div class="subtitle" style="margin:3px 0 0">Gentle magical audio feedback</div></div><button class="toggle ${state.sound?'on':''}" data-toggle="sound" aria-pressed="${state.sound}"><i></i></button></div><div class="sheet-row"><div><b>Haptic feedback</b><div class="subtitle" style="margin:3px 0 0">Small taps for rewards and battles</div></div><button class="toggle ${state.haptics?'on':''}" data-toggle="haptics" aria-pressed="${state.haptics}"><i></i></button></div><div class="sheet-row"><div><b>Replay welcome</b><div class="subtitle" style="margin:3px 0 0">Show the opening cinematic again</div></div><button class="secondary" data-action="replayIntro">Replay</button></div><div class="sheet-row"><div><b>Reset demo save</b><div class="subtitle" style="margin:3px 0 0">Restore quests, items, and progress</div></div><button class="secondary" data-action="reset">Reset</button></div><button class="primary" data-close="modal" style="margin-top:16px">Done</button></section></div>`}
function talkSheet(){const messages=[`I kept the hearth warm while you were away, ${state.name}.`,`Tiny brave choices make the strongest guardians.`,`The Whispering Wood is glowing tonight. I think it remembers us.`,`You do not have to be fearless. You only have to begin.`];const msg=messages[(state.xp+state.gold)%messages.length];return `<div class="modal" data-close="modal"><section class="sheet" role="dialog" aria-modal="true" aria-label="Guardian message"><div class="sheet-handle"></div><div style="height:190px;position:relative">${guardianArt(state.equipped==='moss-cloak'?'moss':state.equipped==='star-charm'?'star':'default')}</div><div style="text-align:center"><h2>${esc(state.guardian)} says…</h2><p style="font:600 20px/1.45 var(--serif);color:#fff2db;margin:17px auto 22px;max-width:380px">“${msg}”</p><button class="primary" data-close="modal">I’m ready</button></div></section></div>`}
function render(){
 if(state.questDay!==new Date().toDateString()){state.questDay=new Date().toDateString();state.quests=clone(initial.quests);state.claimedDaily=false;save()}
 const page=state.tab==='home'?homePage():state.tab==='quests'?questsPage():state.tab==='map'?mapPage():state.tab==='hearth'?hearthPage():vaultPage();
 const top = state.tab==='home' ? '' : header();
 app.innerHTML=`<div class="ambient"></div><div class="noise"></div><div class="shell ${state.tab==='home'?'home-shell':''}">${top}${page}</div>${nav()}`;
}
function showToast(text){document.querySelector('.toast')?.remove();const el=document.createElement('div');el.className='toast';el.textContent=text;document.body.appendChild(el);clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.remove(),2400)}
function burst(x=innerWidth/2,y=innerHeight*.3){const colors=['#ff9a4b','#ffd06f','#ff729f','#9b7cff','#61d8db','#78d29a'];for(let i=0;i<24;i++){const el=document.createElement('i');el.className='confetti';el.style.left=x+'px';el.style.top=y+'px';el.style.background=colors[i%colors.length];el.style.setProperty('--dx',`${(Math.random()-.5)*280}px`);el.style.setProperty('--dy',`${70+Math.random()*240}px`);el.style.setProperty('--rot',`${Math.random()*720-360}deg`);document.body.appendChild(el);setTimeout(()=>el.remove(),1200)}}
function completeQuest(id,button){const q=state.quests.find(x=>x.id===id);if(!q||q.done)return;q.done=true;state.xp+=q.reward;state.gold+=Math.round(q.reward*.7);state.resources.wood+=3;state.resources.crystal+=1;levelCheck();save();haptic([20,40,28]);sound('reward');const r=button?.getBoundingClientRect();burst(r?r.left+r.width/2:innerWidth/2,r?r.top:innerHeight/2);render();showToast(`Quest complete · +${q.reward} bond XP`);if(state.quests.every(x=>x.done))setTimeout(()=>showResult('Daily flame restored!',true),450)}
function levelCheck(){while(state.xp>=state.xpMax){state.xp-=state.xpMax;state.level++;state.xpMax=Math.round(state.xpMax*1.18);state.energy=10;state.hearts=Math.min(8,state.hearts+1)}}
function dailyChest(){if(state.claimedDaily){showToast('The mystery chest returns tomorrow.');sound('tap');return}state.claimedDaily=true;state.gold+=180;state.resources.ember+=2;state.resources.crystal+=4;state.xp+=95;levelCheck();save();sound('reward');haptic([25,45,35]);showResult('A gift from the hearth',false)}
function showResult(title,quest){const overlay=document.createElement('div');overlay.className='result';overlay.innerHTML=`<section class="result-card"><div class="result-art">${quest?collectibleArt('star-charm'):chestArt()}</div><div class="rarity" style="color:var(--gold)">${quest?'RARE MOMENT':'DAILY TREASURE'}</div><h2>${title}</h2><p>${quest?'Every act of courage made the sanctuary shine brighter.':'Emberlyn found this beside the First Flame.'}</p><div class="loot-row"><div class="loot"><b>+${quest?210:180}</b><span>Starlight</span></div><div class="loot"><b>+${quest?3:2}</b><span>Embers</span></div></div><button class="primary" data-action="closeResult">Collect reward</button></section>`;document.body.appendChild(overlay);burst(innerWidth/2,innerHeight*.24)}
function upgrade(id,res,cost){if(state.buildings[id]>=5||state.resources[res]<cost)return;state.resources[res]-=cost;state.buildings[id]++;if(id==='hearth')state.energy=Math.min(10,state.energy+2);if(id==='workshop')state.gold+=70;if(id==='garden')state.hearts=Math.min(8,state.hearts+1);save();sound('reward');haptic(28);render();showToast('Hearth upgrade complete')}
function equip(id){if(!state.owned.includes(id)){showToast('This treasure has not been discovered yet.');sound('tap');return}state.equipped=id;save();sound('reward');haptic(18);render();showToast('Guardian appearance updated')}
function startBattle(id){if(id==='citadel'&&state.level<10){showToast('Reach guardian level 10 to enter.');return}if(state.energy<2){showToast('Emberlyn needs more energy first.');return}const names={woods:'Murmurfang',caves:'Crystal Shade',citadel:'Ashen Warden'},hp={woods:72,caves:95,citadel:130};battle={id,name:names[id],enemyHp:hp[id],enemyMax:hp[id],playerHp:100,playerMax:100,turn:0,locked:false,log:'A shadow steps into the firelight.'};state.energy=Math.max(0,state.energy-2);save();renderBattle();sound('tap');haptic(15)}
function renderBattle(){if(!battle)return;const old=document.querySelector('.battle');if(old)old.remove();const el=document.createElement('section');el.className='battle';el.innerHTML=`<div class="battle-bg">${sceneArt(battle.id==='citadel'?'citadel':battle.id)}</div><div class="battle-top"><div class="battle-name"><span>${battle.name}</span><span>${Math.max(0,battle.enemyHp)}/${battle.enemyMax}</span></div><div class="hp-track"><div class="hp-fill" style="width:${Math.max(0,battle.enemyHp/battle.enemyMax*100)}%"></div></div></div><div class="arena"><div class="enemy">${enemyArt()}</div><div class="player">${guardianArt(state.equipped==='moss-cloak'?'moss':state.equipped==='star-charm'?'star':'default')}</div></div><div class="battle-panel"><div class="battle-log">${esc(battle.log)}</div><div class="actions"><button class="action primary-action" data-attack="strike" ${battle.locked?'disabled':''}>${icon('sword',25)}Strike</button><button class="action" data-attack="flare" ${battle.locked?'disabled':''}>${icon('flame',25)}Flare</button><button class="action" data-attack="heal" ${battle.locked?'disabled':''}>${icon('heart',25)}Mend</button></div><div style="margin-top:10px"><div class="battle-name" style="font-family:var(--sans);font-size:12px"><span>${state.guardian}</span><span>${Math.max(0,battle.playerHp)}/${battle.playerMax}</span></div><div class="hp-track"><div class="hp-fill" style="width:${Math.max(0,battle.playerHp)}%;background:linear-gradient(90deg,#61d8db,#78d29a)"></div></div></div></div>`;document.body.appendChild(el)}
function attack(kind){if(!battle||battle.locked)return;battle.locked=true;let dmg=0;if(kind==='heal'){const heal=18+Math.floor(Math.random()*8);battle.playerHp=Math.min(100,battle.playerHp+heal);battle.log=`${state.guardian} gathers warm light and restores ${heal} courage.`;sound('heal')}else{dmg=(kind==='flare'?17:12)+Math.floor(Math.random()*(kind==='flare'?14:10));battle.enemyHp-=dmg;battle.log=`${kind==='flare'?'Hearth flare':'Swift strike'} deals ${dmg} damage!`;sound('hit');document.querySelector('.enemy')?.classList.add('hurt')}haptic(kind==='heal'?18:28);renderBattle();if(battle.enemyHp<=0){setTimeout(winBattle,650);return}setTimeout(enemyTurn,720)}
function enemyTurn(){if(!battle)return;const dmg=8+Math.floor(Math.random()*12);battle.playerHp-=dmg;battle.turn++;battle.log=`${battle.name} lashes back for ${dmg} damage.`;sound('hit');haptic([20,30,20]);renderBattle();document.querySelector('.player')?.classList.add('hurt');if(battle.playerHp<=0){setTimeout(loseBattle,650)}else{setTimeout(()=>{if(!battle)return;battle.locked=false;battle.log='Choose Emberlyn’s next move.';renderBattle()},500)}}
function winBattle(){const id=battle.id;document.querySelector('.battle')?.remove();battle=null;const gold=id==='citadel'?420:id==='caves'?240:150;state.gold+=gold;state.xp+=id==='citadel'?260:id==='caves'?170:110;state.resources.wood+=id==='woods'?8:3;state.resources.crystal+=id==='caves'?7:2;state.resources.ember+=id==='citadel'?5:1;state.victories++;if(id==='citadel'&&!state.owned.includes('moon-drop'))state.owned.push('moon-drop');levelCheck();save();sound('reward');haptic([25,40,25,40,50]);showResult(`${battleName(id)} defeated!`,false)}
function battleName(id){return id==='citadel'?'Ashen Warden':id==='caves'?'Crystal Shade':'Murmurfang'}
function loseBattle(){document.querySelector('.battle')?.remove();battle=null;state.hearts=Math.max(1,state.hearts-1);save();render();showToast('Emberlyn returned safely to rest.');sound('tap')}
function showIntro(force=false){if(!force&&storageGet(INTRO_KEY))return;const intro=document.createElement('section');intro.className='intro';intro.innerHTML=`<button class="intro-skip" data-action="closeIntro">Skip</button><div class="intro-inner"><div class="intro-art"><div class="hero-orb"></div>${sparkles()}${guardianArt('default')}</div><h1 class="intro-logo"><span>GUARDIANS OF</span>THE HEARTH</h1><p>Your courage keeps a magical sanctuary alive. Complete real-world quests, raise your guardian, and explore the wild realms together.</p><button class="primary" data-action="closeIntro">Awaken the First Flame</button></div>`;document.body.appendChild(intro)}
function modal(content){document.body.insertAdjacentHTML('beforeend',content)}
function closeModal(target){target.closest('.modal')?.remove()}
function reset(){if(!confirm('Reset this demo save and start fresh?'))return;state=clone(initial);save();document.querySelector('.modal')?.remove();render();showToast('Demo progress reset')}

document.addEventListener('click',e=>{
 const tab=e.target.closest('[data-tab]');if(tab){state.tab=tab.dataset.tab;save();render();sound('tap');haptic(8);return}
 const quest=e.target.closest('[data-quest]');if(quest){completeQuest(quest.dataset.quest,quest);return}
 const battleBtn=e.target.closest('[data-battle]');if(battleBtn&&!battleBtn.disabled){startBattle(battleBtn.dataset.battle);return}
 const atk=e.target.closest('[data-attack]');if(atk){attack(atk.dataset.attack);return}
 const up=e.target.closest('[data-upgrade]');if(up){upgrade(up.dataset.upgrade,up.dataset.res,Number(up.dataset.cost));return}
 const eq=e.target.closest('[data-equip]');if(eq){equip(eq.dataset.equip);return}
 const tog=e.target.closest('[data-toggle]');if(tog){state[tog.dataset.toggle]=!state[tog.dataset.toggle];save();document.querySelector('.modal')?.remove();modal(profileSheet());sound('tap');return}
 const close=e.target.closest('[data-close="modal"]');if(close){if(e.target===close||close.matches('button'))closeModal(close);return}
 const action=e.target.closest('[data-action]');if(!action)return;
 switch(action.dataset.action){
  case'profile':modal(profileSheet());break;
  case'talk':modal(talkSheet());sound('reward');haptic(12);break;
  case'dailyChest':dailyChest();break;
  case'closeResult':action.closest('.result')?.remove();render();break;
  case'replayIntro':document.querySelector('.modal')?.remove();showIntro(true);break;
  case'closeIntro':storageSet(INTRO_KEY,'1');action.closest('.intro')?.remove();sound('reward');haptic([20,35,28]);burst(innerWidth/2,innerHeight*.35);break;
  case'reset':reset();break;
 }
});
window.addEventListener('keydown',e=>{if(e.key==='Escape'){document.querySelector('.modal')?.remove();if(battle){document.querySelector('.battle')?.remove();battle=null;render()}}});
render();
requestAnimationFrame(()=>showIntro(false));
})();
</script>
</body>
</html>
